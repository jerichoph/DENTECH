<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capizonda | Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-header">
            <h1 class="brand-name">CAPIZONDA</h1>
            <p class="brand-sub">DENTAL RECORD SYSTEM</p>
        </div>
        
        <form action="/admin_dashboard" class="login-form">
            <div class="input-group">
                <label for="username">Admin ID / Email</label>
                <input type="text" id="username" placeholder="Enter your credentials" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-primary">LOG IN TO SYSTEM</button>
        </form>
    </div>

</body>
</html>
