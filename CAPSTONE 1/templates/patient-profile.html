<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Profile | Capizonda Dental</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --navy: #156699;
            --sky-blue: #8CD3FF;
            --gold: #FFA2AD;
            --grad-navy: linear-gradient(180deg, #156699 0%, #8CD3FF 100%);
            --grad-navy-glass: linear-gradient(180deg, rgba(21, 102, 153, 0.6) 0%, rgba(140, 211, 255, 0.6) 100%);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Kumbh Sans', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            color: white;
        }

        /* Blurred Background Overlay */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url("{{ url_for('static', filename='img/bg.jpg') }}") no-repeat center center fixed;
            background-size: cover;
            filter: blur(10px);
            transform: scale(1.1);
            z-index: -1;
        }

        /* Navigation Header */
        header {
            background: var(--grad-navy);
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .logo-container { display: flex; align-items: center; text-decoration: none; color: white; }
        .logo-icon { height: 40px; margin-right: 10px; mix-blend-mode: lighten; }
        .btn-back {
            color: white; text-decoration: none; font-weight: 600; font-size: 0.9rem;
            padding: 8px 15px; border: 1px solid rgba(255,255,255,0.4); border-radius: 10px;
        }

        /* Profile Layout */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 8%;
        }

        .profile-card {
            background: var(--grad-navy-glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 900px;
            display: flex;
            gap: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .profile-left { text-align: center; }
        .main-avatar {
            width: 150px; height: 150px;
            border-radius: 50%;
            border: 5px solid var(--gold);
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .profile-right { flex: 1; }
        .profile-right h2 { font-size: 2rem; margin-bottom: 5px; }
        .patient-tag { background: var(--gold); padding: 3px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .info-item label { display: block; font-size: 0.75rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
        .info-item p { font-size: 1.1rem; font-weight: 400; }

        /* The 4 Navigations */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .nav-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
        }

        .nav-card:hover {
            background: var(--gold);
            transform: translateY(-5px);
            border-color: var(--gold);
        }

        .nav-card img { width: 40px; margin-bottom: 10px; filter: brightness(0) invert(1); }
        .nav-card span { display: block; font-weight: 600; font-size: 0.9rem; }

        @media (max-width: 768px) {
            .profile-card { flex-direction: column; align-items: center; }
            .nav-grid { grid-template-columns: 1fr 1fr; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <a href="/home" class="logo-container">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo" class="logo-icon">
        <span style="font-weight:700">CAPIZONDA</span>
    </a>
    <a href="/google-auth#" class="btn-back">← Back to Home</a>
</header>

<div class="container">
    <div class="profile-card">
        <div class="profile-left">
            <img src="https://ui-avatars.com/api/?name={{ name }}&background=eeb455&color=fff&size=200" class="main-avatar" alt="User">
            <br>
            <span class="patient-tag">PATIENT ID: #1024</span>
        </div>
        
        <div class="profile-right">
            <h2>{{ name }}</h2>
            <p style="opacity:0.9">Regular Checkup Patient</p>
            
            <div class="info-grid">
                <div class="info-item">
                    <label>Email Address</label>
                    <p>patient@example.com</p>
                </div>
                <div class="info-item">
                    <label>Phone Number</label>
                    <p>+63 912 345 6789</p>
                </div>
                <div class="info-item">
                    <label>Date of Birth</label>
                    <p>January 15, 1998</p>
                </div>
                <div class="info-item">
                    <label>Last Visit</label>
                    <p>Feb 12, 2026</p>
                </div>
            </div>
        </div>
    </div>

    <div class="nav-grid">
        <a href="#" class="nav-card">
            <img src="https://img.icons8.com/ios-filled/50/ffffff/appointment-reminders.png" alt="Notifications">
            <span>Notifications</span>
        </a>
        <a href="#" class="nav-card">
            <img src="https://img.icons8.com/ios-filled/50/ffffff/calendar--v1.png" alt="Schedule">
            <span>My Schedule</span>
        </a>
        <a href="#" class="nav-card">
            <img src="https://img.icons8.com/ios-filled/50/ffffff/medical-record.png" alt="Records">
            <span>Medical Records</span>
        </a>
        <a href="#" class="nav-card">
            <img src="https://img.icons8.com/ios-filled/50/ffffff/settings.png" alt="Settings">
            <span>Settings</span>
        </a>
    </div>
</div>

</body>
</html>
