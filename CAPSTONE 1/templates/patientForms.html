<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capizonda | Dental Record Chart</title>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chart-style.css') }}">
</head>
<body>

    <header class="main-header">
        <div class="logo-container">
            <span class="brand-name">CAPIZONDA</span>
            <span class="brand-sub">DENTAL RECORD SYSTEM</span>
        </div>
        <button class="btn-save" onclick="saveRecord()">SAVE RECORD</button>
    </header>

    <main class="chart-container">
        <aside class="action-palette">
            <div class="palette-title">ACTION PALETTE</div>
            <div class="tool active" data-tool="healthy" onclick="setTool(this)">🦷<span>Healthy</span></div>
            <div class="tool" data-tool="caries" onclick="setTool(this)">🖌️<span>Caries</span></div>
            <div class="tool" data-tool="filling" onclick="setTool(this)">💧<span>Filling</span></div>
            <div class="tool" data-tool="crown" onclick="setTool(this)">👑<span>Crown</span></div>
            <div class="tool" data-tool="rootcanal" onclick="setTool(this)">💉<span>Root Canal</span></div>
            <div class="tool" data-tool="extraction" onclick="setTool(this)">✂️<span>Extraction</span></div>
            <div class="tool" data-tool="check" onclick="setTool(this)">✔️<span>Check</span></div>
        </aside>

        <section class="dental-chart">
            <h2 class="chart-title">DENTAL RECORD CHART</h2>
            
            <div class="odontogram-container">
                <div class="axis-v"></div>
                
                <div class="status-row-wrapper">
                    <div class="label-inline">STATUS RIGHT</div>
                    <div class="unified-grid" id="grid-upper"></div>
                    <div class="label-inline">LEFT</div>
                </div>
                
                <div class="teeth-row" id="teeth-temp-top"></div>
                <div class="section-label">TEMPORARY TEETH</div>

                <div class="axis-h"></div>

                <div style="position: relative; width: 100%;">
                    <div class="label-side rotated">PERMANENT TEETH</div>
                    <div class="permanent-block">
                        <div class="unified-grid wide" id="grid-perm-upper"></div>
                        <div class="teeth-row wide" id="teeth-perm-top"></div>
                        <div class="axis-h-mid"></div>
                        <div class="teeth-row wide reverse-layout" id="teeth-perm-bottom"></div>
                        <div class="unified-grid wide" id="grid-perm-lower"></div>
                    </div>
                </div>

                <div class="axis-h"></div>

                <div class="section-label">TEMPORARY TEETH</div>
                <div class="teeth-row reverse-layout" id="teeth-temp-bottom"></div>
                
                <div class="status-row-wrapper">
                    <div class="label-inline">STATUS RIGHT</div>
                    <div class="unified-grid" id="grid-lower"></div>
                    <div class="label-inline">LEFT</div>
                </div>
            </div>
        </section>
    </main>

    <div id="tool-modal" class="modal">
        <div class="modal-content">
            <h3>Select Action Color</h3>
            <div class="modal-buttons">
                <button class="btn-modal-red" onclick="applyModalChoice('#ff4d4d')">RED</button>
                <button class="btn-modal-blue" onclick="applyModalChoice('#156699')">BLUE</button>
                <button class="btn-modal-cancel" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/chart-logic.js') }}"></script>
</body>
</html>
