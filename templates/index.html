<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Capizonda Dental Clinic</title>
    <link rel="stylesheet" href="/templates/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<style>

    /* INDEX */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

:root {
    --navy: #1a3a5a;
    --gold: #eeb455;
    --white: #ffffff;
}

body {
    background-color: var(--navy);
    overflow-x: hidden;
}

header {
    background-color: var(--navy);
    padding: 15px 5%;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo-container {
    display: flex;
    align-items: center;
    color: var(--white);
}

.logo-icon {
    height: 40px;
    margin-right: 10px;
}

.brand-name {
    display: block;
    font-weight: 600;
    letter-spacing: 1px;
    font-size: 1.2rem;
}

.brand-sub {
    font-size: 0.7rem;
    display: block;
}

.nav-links {
    display: flex;
    list-style: none;
}

.nav-links li {
    margin: 0 15px;
}

.nav-links a {
    text-decoration: none;
    color: var(--white);
    font-size: 0.85rem;
    font-weight: 400;
}

.nav-links a.active {
    color: var(--gold);
}

.nav-actions {
    display: flex;
    align-items: center;
    gap: 20px;
}

.btn-contact {
    background-color: var(--gold);
    color: var(--white);
    padding: 10px 25px;
    border-radius: 20px;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9rem;
}

.hamburger {
    cursor: pointer;
}

.hamburger span {
    display: block;
    width: 25px;
    height: 3px;
    background: var(--white);
    margin: 4px 0;
}


.hero-section {
    position: relative;
    height: 70vh;
    background-image: url('dental-office-bg.jpg');
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: flex-end;
    justify-content: center;
}

.hero-section::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.4); 
}

.hero-content {
    position: relative;
    z-index: 1;
    width: 90%;
    max-width: 1200px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
}

.hero-image-wrapper {
    flex: 1;
}

.patient-img {
    height: 450px;
    display: block;
}

.cta-box {
    background: rgba(26, 58, 90, 0.8);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    color: var(--white);
    width: 350px;
    margin-bottom: 50px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.cta-box p {
    font-size: 1.2rem;
    margin-bottom: 20px;
}

.cta-icon img {
    width: 40px;
    margin-bottom: 20px;
}

.btn-appointment {
    display: inline-block;
    background-color: var(--gold);
    color: var(--white);
    padding: 12px 25px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 600;
    width: 100%;
}

.bottom-bar {
    background-color: var(--navy);
    height: 100px;
}

/* ABOUT */
/* Container for alignment */
.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
}

/* About Hero Header */
.about-hero {
    background-color: var(--navy);
    color: var(--white);
    padding: 80px 0;
    text-align: center;
}

.about-hero h1 {
    font-size: 2.5rem;
    margin-bottom: 20px;
}

.about-hero p {
    max-width: 700px;
    margin: 0 auto;
    opacity: 0.9;
    line-height: 1.6;
}

/* Team Section Styles */
.team-section {
    padding: 80px 0;
    background-color: #f4f7f9;
}

.section-title {
    text-align: center;
    color: var(--navy);
    font-size: 2.2rem;
    margin-bottom: 10px;
}

.section-subtitle {
    text-align: center;
    color: #666;
    margin-bottom: 50px;
}

.team-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px;
}

.doctor-card {
    background: var(--white);
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    transition: transform 0.3s ease;
}

.doctor-card:hover {
    transform: translateY(-10px);
}

.doctor-img img {
    width: 100%;
    height: 350px;
    object-fit: cover;
}

.doctor-info {
    padding: 25px;
    text-align: center;
}

.doctor-info h3 {
    color: var(--navy);
    margin-bottom: 5px;
}

.specialty {
    color: var(--gold);
    font-weight: 600;
    font-size: 0.9rem;
    text-transform: uppercase;
    margin-bottom: 15px;
}

.bio {
    font-size: 0.9rem;
    color: #555;
    line-height: 1.5;
    margin-bottom: 20px;
}

.doctor-contact {
    display: flex;
    justify-content: center;
    gap: 15px;
}

.doctor-contact a {
    text-decoration: none;
    background: #f0f4f8;
    width: 45px;
    height: 45px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: 0.3s;
}

.doctor-contact a:hover {
    background: var(--gold);
    color: white;
}

/* Bottom CTA section */
.about-cta {
    background-color: var(--navy);
    padding: 60px 0;
    text-align: center;
    color: white;
}

.about-cta h3 {
    margin-bottom: 25px;
    font-size: 1.5rem;
}

/* Footer Spacer */
.bottom-bar {
    background-color: #0d253f; /* Slightly darker navy */
    height: 60px;
}

/*PATIENT FORMS*/

.chart-page {
    background: #555; /* Dark background like your image */
    display: flex;
    justify-content: center;
    padding: 20px;
}

.chart-container {
    display: flex;
    background: #333;
    border-radius: 20px;
    padding: 20px;
    color: white;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

/* Palette Styles */
.action-palette {
    width: 120px;
    border-right: 1px solid #555;
    padding-right: 15px;
    text-align: center;
}

.palette-header { font-size: 10px; margin-bottom: 20px; color: #aaa; }

.tool {
    padding: 10px 5px;
    margin-bottom: 10px;
    cursor: pointer;
    border-radius: 8px;
    transition: 0.2s;
    font-size: 11px;
}

.tool:hover { background: #444; }
.tool.active { background: #1a3a5a; border: 1px solid var(--gold); }

/* Tooth Structure */
.teeth-row { display: flex; justify-content: center; gap: 5px; margin: 15px 0; }

.tooth-unit { text-align: center; }

.tooth-circle {
    position: relative;
    width: 35px;
    height: 35px;
    background: white;
    border-radius: 50%;
    border: 2px solid #222;
    overflow: hidden;
}

/* 5 Clickable Sections */
.seg { position: absolute; width: 100%; height: 100%; }
.seg.top { clip-path: polygon(0 0, 100% 0, 50% 50%); }
.seg.bottom { clip-path: polygon(0 100%, 100% 100%, 50% 50%); }
.seg.left { clip-path: polygon(0 0, 0 100%, 50% 50%); }
.seg.right { clip-path: polygon(100% 0, 100% 100%, 50% 50%); }
.seg.center { 
    width: 40%; height: 40%; top: 30%; left: 30%; 
    border: 1px solid #222; background: white; z-index: 2;
}

/* Painting Colors */
.caries { background: #ff4d4d !important; }
.filling { background: #4da6ff !important; }

/* Overlays */
.xtraction-mark {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    color: red; font-size: 35px; line-height: 35px; z-index: 10;
    display: none; pointer-events: none;
}

.crown-mark {
    position: absolute; top: 0; left: 45%; width: 4px; height: 100%;
    background: #4da6ff; z-index: 5; display: none; pointer-events: none;
}

/* Status Boxes */
.status-row { display: flex; justify-content: center; gap: 5px; }
.stat-box {
    width: 35px; height: 25px; border: 1px solid #888;
    background: white; cursor: pointer; color: black;
    display: flex; align-items: center; justify-content: center;
}
</style>
